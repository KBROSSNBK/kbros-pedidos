<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>✌ KBROS 😎</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    :root {
      --bg: #0c0c0e;
      --surface: #141417;
      --surface2: #1c1c21;
      --surface3: #242429;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.13);
      --text: #f0f0f2;
      --muted: #888892;
      --accent: #ff6b2b;
      --accent2: #ff9f1c;
      --green: #2ecc71;
      --red: #ff4757;
      --glow: rgba(255,107,43,0.25);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* BG noise texture */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: 0.4;
    }

    /* HEADER */
    header {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 1.5rem;
      background: linear-gradient(180deg, #161618 0%, transparent 100%);
      border-bottom: 1px solid var(--border);
      z-index: 2;
    }
    .logo-wrap {
      position: relative;
      cursor: pointer;
      user-select: none;
    }
    .logo-wrap img {
      max-width: 200px;
      width: 70vw;
      height: auto;
      border-radius: 16px;
      display: block;
      filter: drop-shadow(0 0 28px rgba(255,107,43,0.35));
      transition: filter 0.3s, transform 0.3s;
    }
    .logo-wrap:hover img { filter: drop-shadow(0 0 38px rgba(255,107,43,0.55)); transform: scale(1.03); }
    .logo-tagline {
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 6px;
      font-size: 0.85rem;
      color: var(--accent);
      text-align: center;
      margin-top: 0.6rem;
      opacity: 0.85;
    }

    /* TOP STATS */
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      padding: 0.9rem 1rem;
      z-index: 2;
      position: relative;
    }
    .stat-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 999px;
      padding: 0.45rem 1rem;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .stat-chip:active { transform: scale(0.95); }
    .stat-chip.cart-chip { border-color: rgba(255,107,43,0.4); }
    .stat-chip.cart-chip:hover { background: rgba(255,107,43,0.1); border-color: var(--accent); }
    .stat-chip.like-chip:hover { background: rgba(255,71,87,0.1); border-color: var(--red); }
    .chip-count { font-weight: 700; font-size: 0.95rem; }

    /* MENU TOGGLE */
    .menu-toggle-wrap {
      display: flex;
      justify-content: center;
      gap: 0.6rem;
      flex-wrap: wrap;
      padding: 0 1rem 1rem;
      z-index: 2;
      position: relative;
    }
    .menu-toggle-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 0.85rem 2.5rem;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 3px;
      cursor: pointer;
      box-shadow: 0 4px 24px var(--glow);
      transition: transform 0.15s, box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .menu-toggle-btn:active { transform: scale(0.96); }
    .menu-toggle-btn.secondary-btn {
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--text);
      box-shadow: none;
      font-size: 1.1rem;
      padding: 0.85rem 1.6rem;
    }

    /* MENU */
    #menu {
      padding-bottom: 110px;
      z-index: 2;
      position: relative;
    }

    /* CATEGORIA */
    .categoria-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.2rem;
      background: var(--surface);
      border-top: 1px solid var(--border);
      cursor: pointer;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 2px;
      color: var(--text);
      transition: background 0.2s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .categoria-btn:hover { background: var(--surface2); }
    .categoria-btn.active { background: var(--surface2); color: var(--accent); border-top-color: var(--accent); }
    .cat-arrow {
      font-size: 0.7rem;
      color: var(--muted);
      transition: transform 0.25s;
    }
    .categoria-btn.active .cat-arrow { transform: rotate(90deg); color: var(--accent); }

    /* PRODUCTOS GRID */
    .productos {
      display: none;
      flex-wrap: wrap;
      padding: 0.7rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      animation: fadeSlide 0.22s ease;
    }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .producto {
      width: calc(50% - 0.5rem);
      margin: 0.25rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.85rem 0.7rem;
      cursor: pointer;
      font-size: 0.82rem;
      text-align: center;
      color: var(--text);
      transition: background 0.15s, border-color 0.15s, transform 0.12s;
      position: relative;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }
    .producto::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,107,43,0.06), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .producto:hover { border-color: rgba(255,107,43,0.4); background: var(--surface3); }
    .producto:hover::before { opacity: 1; }
    .producto:active { transform: scale(0.96); background: var(--surface3); }
    .prod-nombre { font-weight: 500; line-height: 1.3; margin-bottom: 0.4rem; }
    .prod-precio {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      color: var(--accent);
      letter-spacing: 1px;
    }
    .producto.flash {
      animation: prodFlash 0.4s ease;
    }
    @keyframes prodFlash {
      0%   { background: var(--surface2); }
      40%  { background: rgba(255,107,43,0.22); border-color: var(--accent); }
      100% { background: var(--surface2); }
    }

    /* CARRITO DETALLE */
    #carrito-detalle {
      display: none;
      padding: 1rem 1rem 0.5rem;
      background: var(--surface);
      border-top: 1px solid var(--border);
      z-index: 2;
      position: relative;
      animation: fadeSlide 0.2s ease;
    }
    #carrito-detalle h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 2px;
      color: var(--accent);
      margin-bottom: 0.6rem;
    }
    #estimadoPuntos {
      font-size: 0.78rem;
      color: var(--accent2);
      margin-bottom: 0.6rem;
      font-weight: 600;
    }
    #detalleItems { list-style: none; }
    #detalleItems li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.88rem;
      gap: 0.5rem;
    }
    #detalleItems li:last-child { border-bottom: none; }
    .item-info { flex: 1; }
    .item-nombre { font-weight: 500; }
    .item-precio { color: var(--accent); font-weight: 600; font-size: 0.9rem; }
    .item-controls { display: flex; align-items: center; gap: 4px; }
    .item-controls button {
      width: 28px; height: 28px;
      border-radius: 8px;
      border: 1px solid var(--border2);
      background: var(--surface3);
      color: var(--text);
      font-size: 0.9rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .item-controls button:hover { background: var(--accent); border-color: var(--accent); }
    .item-qty {
      font-weight: 700;
      min-width: 20px;
      text-align: center;
      font-size: 0.95rem;
    }

    /* CARRITO FIJO */
    .carrito-fijo {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(18, 18, 20, 0.95);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-top: 1px solid var(--border2);
      padding: 0.8rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      z-index: 100;
      box-shadow: 0 -8px 32px rgba(0,0,0,0.5);
    }
    .btn-limpiar {
      background: transparent;
      border: 1px solid rgba(255,71,87,0.4);
      color: var(--red);
      border-radius: 12px;
      padding: 0.75rem 1rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-limpiar:hover { background: rgba(255,71,87,0.12); border-color: var(--red); }
    .total-display {
      flex: 1;
      text-align: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.35rem;
      letter-spacing: 2px;
      color: var(--text);
    }
    .total-display span { color: var(--accent); }
    .btn-pedir {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 12px;
      padding: 0.75rem 1.4rem;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 2px;
      color: #fff;
      cursor: pointer;
      box-shadow: 0 4px 18px var(--glow);
      transition: transform 0.15s, box-shadow 0.2s;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-pedir:active { transform: scale(0.96); }
    .btn-pedir.animar { animation: pedirPulse 1.2s ease infinite; }
    @keyframes pedirPulse {
      0%,100% { box-shadow: 0 4px 18px var(--glow); }
      50% { box-shadow: 0 6px 30px rgba(255,107,43,0.55); transform: translateY(-1px); }
    }

    /* MODAL BASE */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.82);
      backdrop-filter: blur(6px);
      display: flex; align-items: flex-end; justify-content: center;
      z-index: 1000;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal-sheet {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 20px 20px 0 0;
      padding: 1.5rem;
      width: 100%;
      max-width: 480px;
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(60px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }
    .modal-handle {
      width: 40px; height: 4px;
      background: var(--border2);
      border-radius: 99px;
      margin: 0 auto 1.2rem;
    }
    .modal-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 3px;
      color: var(--text);
      text-align: center;
      margin-bottom: 1.2rem;
    }
    .modal-option {
      display: flex; align-items: center; gap: 1rem;
      background: var(--surface2);
      border: 2px solid var(--border);
      border-radius: 14px;
      padding: 1rem 1.2rem;
      margin-bottom: 0.8rem;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .modal-option:hover, .modal-option.selected {
      border-color: var(--accent);
      background: rgba(255,107,43,0.08);
    }
    .modal-option input[type=radio] { display: none; }
    .modal-opt-icon { font-size: 1.8rem; }
    .modal-opt-text { flex: 1; }
    .modal-opt-title { font-weight: 600; font-size: 1rem; }
    .modal-opt-sub { font-size: 0.82rem; color: var(--muted); margin-top: 2px; }
    .modal-check {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2px solid var(--border2);
      transition: background 0.2s, border-color 0.2s;
    }
    .modal-option.selected .modal-check {
      background: var(--accent);
      border-color: var(--accent);
    }
    .modal-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 14px;
      padding: 1rem;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 3px;
      color: #fff;
      cursor: pointer;
      margin-top: 0.5rem;
      box-shadow: 0 4px 20px var(--glow);
      transition: transform 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .modal-btn:active { transform: scale(0.97); }
    .modal-input-label {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 500;
      margin-bottom: 0.4rem;
      margin-top: 0.8rem;
      display: block;
      letter-spacing: 0.5px;
    }
    .modal-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 12px;
      padding: 0.85rem 1rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .modal-input:focus { border-color: var(--accent); }
    .modal-input::placeholder { color: var(--muted); }

    /* TOAST */
    #toast {
      position: fixed;
      top: 1rem; left: 50%;
      transform: translateX(-50%);
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 999px;
      padding: 0.55rem 1.2rem;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text);
      z-index: 999;
      display: none;
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    /* LOGO ANIMATIONS */
    @keyframes shake { 0%{transform:rotate(0)} 25%{transform:rotate(6deg)} 50%{transform:rotate(-6deg)} 75%{transform:rotate(4deg)} 100%{transform:rotate(0)} }
    @keyframes spin { from{transform:rotate(0)} to{transform:rotate(360deg)} }
    @keyframes zoom { 0%,100%{transform:scale(1)} 50%{transform:scale(1.12)} }
    @keyframes bounce-logo { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
    .logo-anim { animation-duration: 0.6s; animation-fill-mode: both; }

    /* BOTÓN CERRAR (X) para todos los sub-menús / modales */
    .modal-close-x {
      position: absolute;
      top: 1rem; right: 1rem;
      width: 34px; height: 34px;
      border-radius: 50%;
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--text);
      font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      z-index: 5;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }
    .modal-close-x:hover { background: var(--surface3); border-color: var(--accent); }
    .modal-close-x:active { transform: scale(0.92); }

    /* ======================= K-POINTS: LOBBY ======================= */
    .lobby-overlay {
      position: fixed; inset: 0;
      background: radial-gradient(circle at 50% 0%, #201408 0%, #0c0c0e 70%);
      display: flex; align-items: center; justify-content: center;
      z-index: 3000;
      padding: 1.5rem;
    }
    .lobby-card {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 22px;
      padding: 2rem 1.6rem;
      max-width: 380px;
      width: 100%;
      text-align: center;
      box-shadow: 0 25px 70px rgba(0,0,0,0.55);
    }
    .lobby-logo { width: 110px; margin: 0 auto 1rem; display: block; border-radius: 14px; }
    .lobby-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem; letter-spacing: 4px; color: var(--accent);
      margin-bottom: 0.2rem;
    }
    .lobby-sub { color: var(--muted); font-size: 0.85rem; margin-bottom: 1.8rem; }
    .google-btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; background: #fff; color: #3c4043; border: none;
      border-radius: 12px; padding: 0.9rem; font-weight: 600; font-size: 0.95rem;
      cursor: pointer; margin-bottom: 0.5rem; transition: transform .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .google-btn:active { transform: scale(0.97); }
    .lobby-note { font-size: 0.75rem; color: var(--muted); margin-bottom: 1.2rem; }
    .guest-btn {
      width: 100%; background: transparent; border: 1px solid var(--border2);
      color: var(--text); border-radius: 12px; padding: 0.85rem;
      font-weight: 600; cursor: pointer; margin-bottom: 0.4rem;
      -webkit-tap-highlight-color: transparent;
    }
    .guest-btn:active { transform: scale(0.97); }

    /* ======================= K-POINTS: TOPBAR ======================= */
    .topbar {
      display: none;
      position: sticky; top: 0;
      align-items: center; justify-content: space-between;
      padding: 0.7rem 1rem;
      background: rgba(18,18,20,0.92);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      z-index: 500;
    }
    .topbar-points {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.25rem; letter-spacing: 1px; color: var(--accent);
      display: flex; align-items: center; gap: 6px;
    }
    .topbar-rank { font-size: 0.7rem; color: var(--muted); margin-top: -2px; }
    .topbar-profile { position: relative; }
    .topbar-profile img {
      width: 38px; height: 38px; border-radius: 50%;
      border: 2px solid var(--accent); cursor: pointer; object-fit: cover;
      -webkit-tap-highlight-color: transparent;
    }
    .profile-dropdown {
      display: none; position: absolute; right: 0; top: 48px;
      background: var(--surface2); border: 1px solid var(--border2);
      border-radius: 12px; min-width: 190px; overflow: hidden;
      box-shadow: 0 10px 32px rgba(0,0,0,0.5); z-index: 510;
    }
    .profile-dropdown.show { display: block; }
    .profile-dropdown div {
      padding: 0.85rem 1rem; font-size: 0.88rem; cursor: pointer;
      border-bottom: 1px solid var(--border);
    }
    .profile-dropdown div:last-child { border-bottom: none; color: var(--red); }
    .profile-dropdown div:hover { background: var(--surface3); }

    /* ======================= K-POINTS: FLOATING BUTTONS ======================= */
    .help-fab, .admin-fab {
      position: fixed; bottom: 100px;
      width: 46px; height: 46px; border-radius: 50%;
      background: var(--surface2); border: 1px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; z-index: 200;
      box-shadow: 0 4px 20px rgba(0,0,0,0.45);
      -webkit-tap-highlight-color: transparent;
    }
    .help-fab { right: 16px; font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; color: var(--accent); }
    .admin-fab { left: 16px; font-size: 1.2rem; display: none; }

    /* ======================= K-POINTS: PERFIL / RANGO ======================= */
    .rank-badge {
      display: inline-block; padding: 0.35rem 1rem; border-radius: 99px;
      background: var(--surface2); border: 1px solid var(--border2);
      font-size: 0.85rem; font-weight: 600; margin-bottom: 0.8rem;
    }

    /* ======================= K-POINTS: ADMIN ======================= */
    .admin-stats-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px; margin-bottom: 1rem;
    }
    .stat-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 12px; padding: 0.8rem; text-align: center;
    }
    .stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; color: var(--accent); }
    .stat-label { font-size: 0.7rem; color: var(--muted); }
    .admin-tabs { display: flex; gap: 6px; margin-bottom: 0.9rem; flex-wrap: wrap; }
    .admin-tab-btn {
      flex: 1; min-width: 70px; background: var(--surface2); border: 1px solid var(--border);

      if (total > 0) {
        const puntosEst = Math.floor(total / pointsConversion);

  function modificarCantidad(index, cambio) {
    carrito[index].cantidad += cambio;
    if (carrito[index].cantidad <= 0) carrito.splice(index, 1);

  function crearOverlay() {
    const ov = document.createElement("div");
    ov.className = "modal-overlay";
    document.body.appendChild(ov);
    return ov;
  }

  // K-POINTS: agrega un botón "X" al modal actual. onCerrar (opcional) se ejecuta
  // ANTES de quitar el modal (útil para resolver/rechazar promesas pendientes).
  function agregarBotonCerrar(ov, onCerrar) {
    const sheet = ov.querySelector(".modal-sheet");
    if (!sheet) return;
    sheet.style.position = "relative";
    const btn = document.createElement("button");
    btn.className = "modal-close-x";
    btn.innerHTML = "✕";
    btn.type = "button";
    btn.onclick = () => {
      if (onCerrar) onCerrar();
      if (ov.parentNode) document.body.removeChild(ov);
    };
    sheet.appendChild(btn);
  }

  function elegirModoEntrega() {
    return new Promise(resolve => {
      const ov = crearOverlay();
      ov.innerHTML = `
        <div class="modal-sheet">
          <div class="modal-handle"></div>
          <div class="modal-title">¿CÓMO LO QUIERES?</div>

              <div class="modal-opt-sub">Te lo llevamos a domicilio</div>
            </div>
            <div class="modal-check" id="check-delivery"></div>
          </div>
          <div class="modal-option" id="opt-retiro" onclick="seleccionarOpt('retiro')">

          </div>
          <button class="modal-btn" id="btnConfirmarModo">CONFIRMAR</button>
        </div>`;
      agregarBotonCerrar(ov, () => resolve(null));

      let selected = null;
      window.seleccionarOpt = (opt) => {
        selected = opt;
        document.querySelectorAll(".modal-option").forEach(el => el.classList.remove("selected"));
        document.getElementById("opt-" + opt).classList.add("selected");
      };
      document.getElementById("btnConfirmarModo").onclick = () => {
        if (!selected) { alert("Selecciona una opción."); return; }
        document.body.removeChild(ov);
        resolve(selected === "delivery" ? "DELIVERY" : "RETIRO");
      };
    });
  }

  function pedirNombreYContacto() {
    return new Promise(resolve => {
      const ov = crearOverlay();
      ov.innerHTML = `
        <div class="modal-sheet">
          <div class="modal-handle"></div>
          <div class="modal-title">TUS DATOS</div>

          <button class="modal-btn" style="margin-top:1.2rem" id="btnConfirmarDatos">LISTO ✓</button>
        </div>`;
      agregarBotonCerrar(ov, () => resolve(null));
      document.getElementById("btnConfirmarDatos").onclick = () => {
        const nombre = document.getElementById("nombreInput").value.trim();
        const telefono = document.getElementById("telefonoInput").value.trim();
        if (!nombre) return alert("Ingresa tu nombre.");
        if (!/^\d{9}$/.test(telefono)) return alert("Número inválido. 9 dígitos sin +56.");
        // SAFARI/iPhone: hay que abrir la pestaña de WhatsApp AQUÍ MISMO, en el instante
        // del clic. Si se abre más adelante (después de guardar en Firebase, etc.) Safari

        // Por eso abrimos una pestaña en blanco ahora, y más abajo (en enviarPedido)
        // solo la "completamos" con el link real de WhatsApp.
        const ventanaWhatsApp = window.open("", "_blank");
        document.body.removeChild(ov);
        resolve({ nombre, telefono, ventanaWhatsApp });
      };
    });
  }

  function obtenerUbicacionGPS() {
    return new Promise((resolve, reject) => {
      const ov = crearOverlay();

        </div>`;
      agregarBotonCerrar(ov, () => reject(new Error("cancelado_por_usuario")));
      const ubicacionKBROS = [-33.6067, -70.6861];
      const mapa = L.map("mapa").setView(ubicacionKBROS, 16);
      L.marker(ubicacionKBROS).addTo(mapa).bindPopup("✌KBROS😎").openPopup();
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { maxZoom: 19 }).addTo(mapa);

        resolve({ lat: coordenadas.lat, lng: coordenadas.lng });

    });

  async function calcularDistanciaAuto(latC, lngC) {
    const local = { lat: -33.60675364336594, lng: -70.68617400931403 };
    const resp = await fetch(`https://router.project-osrm.org/route/v1/driving/${lngC},${latC};${local.lng},${local.lat}?overview=false`);
    const data = await resp.json();
    return data.routes[0].distance / 1000;
  }

  async function enviarPedido() {
    if (carrito.length === 0) return alert("Primero agrega productos al carrito.");
    const modo = await elegirModoEntrega();
    if (!modo) return;
    let costoDelivery = 0, ubicacionCliente = "";
    if (modo === "DELIVERY") {
      try {
        const coords = await obtenerUbicacionGPS();
        ubicacionCliente = `${coords.lat},${coords.lng}`;
        const kmR = Math.round(await calcularDistanciaAuto(coords.lat, coords.lng));
        costoDelivery = kmR <= 1 ? 1700 : 1700 + (kmR - 1) * 300;
      } catch {
        alert("No se pudo obtener tu ubicación."); return;
      }
    }
    const datos = await pedirNombreYContacto();
    if (!datos) return;
    const totalPedido = carrito.reduce((s, p) => s + p.precio * p.cantidad, 0);
    const totalFinal = totalPedido + costoDelivery;
    let mensaje = `Soy ${datos.nombre}\nQuiero - ${modo}`;
    if (modo === "DELIVERY") mensaje += `\nUbicación: https://www.google.com/maps?q=${ubicacionCliente}`;
    mensaje += `\nContacto: +56${datos.telefono}\n\nDetalle del pedido:\n`;
    carrito.forEach(p => { mensaje += `• ${p.nombre} x${p.cantidad} = $${p.precio * p.cantidad}\n`; });
    mensaje += `\nSubTotal: $${totalPedido}`;
    if (modo === "DELIVERY") mensaje += `\nDelivery: $${costoDelivery}`;
    mensaje += `\n\nTOTAL: $${totalFinal}`;

    // K-POINTS: si el cliente inició sesión, se genera un registro de puntos PENDIENTE
    // (el administrador debe aprobarlo desde el panel para que se acrediten)
    try {
      if (currentUser && userData) {
        const puntosGanados = Math.floor(totalFinal / pointsConversion);
        const pedidoData = {
          uid: currentUser.uid,
          codigo: userData.codigo,

          modo: modo,
          monto: totalFinal,
          puntos: puntosGanados,
          fecha: Date.now(),
          estado: "pendiente",
          origen: "web"
        };
        await db.ref("pendingPoints").push(pedidoData);
        await db.ref("orders").push(pedidoData);
      }
    } catch (e) {
      console.error("No se pudo registrar el pedido para K-POINTS:", e);
    }

    const urlWhatsApp = `https://wa.me/56956446048?text=${encodeURIComponent(mensaje)}`;
    if (datos.ventanaWhatsApp && !datos.ventanaWhatsApp.closed) {
      // Caso normal (incluye iPhone/Safari): completamos la pestaña que abrimos al tocar "LISTO ✓"
      datos.ventanaWhatsApp.location.href = urlWhatsApp;
    } else {
      // Respaldo por si el navegador bloqueó la pestaña igual: intentamos abrir una nueva...
      const nuevaVentana = window.open(urlWhatsApp, "_blank");
      if (!nuevaVentana) {
        // ...y si tampoco se pudo, navegamos en la misma pestaña para no dejar al cliente sin enviar el pedido.
        window.location.href = urlWhatsApp;
      }
    }
    limpiarCarrito();
  }

      btn.onclick = () => {
        if (activeBox && activeBox !== box) {
          activeBox.style.display = "none";
          activeBtn.classList.remove("active");
        }
        if (activeBox === box) {
          box.style.display = "none";
          btn.classList.remove("active");
          activeBox = null; activeBtn = null;
        } else {
          box.style.display = "flex";
          btn.classList.add("active");
          activeBox = box; activeBtn = btn;
        }
      };

      cont.appendChild(btn);
      cont.appendChild(box);
    }
  }

  const ADMIN_EMAIL = "kbros.contacto@gmail.com";

  let birthdayBonus = 500;    // K-POINTS de regalo de cumpleaños (editable desde el Panel Admin > Config)

  const ranksConfig = [

  function calcularRango(puntos) {
    let r = ranksConfig[0];
    for (const rc of ranksConfig) { if (puntos >= rc.min) r = rc; }
    return r;
  }

  async function cargarSettings() {
    try {
      const snap = await db.ref("settings").get();
      if (snap.exists()) {
        const s = snap.val();
        if (s.pointsPerClp) pointsConversion = s.pointsPerClp;
        if (typeof s.bonoCumpleanos === "number") birthdayBonus = s.bonoCumpleanos;
      } else {
        await db.ref("settings").set({ pointsPerClp: pointsConversion, nombrePrograma: "K-POINTS", bonoCumpleanos: birthdayBonus });
      }
    } catch (e) { console.error("Error cargando settings:", e); }
    await cargarRangosConfig();
  }

  // K-POINTS: carga los rangos guardados en Firebase (si el admin los editó desde Config);
  // si no existen todavía, guarda los rangos por defecto para que queden editables a futuro.
  async function cargarRangosConfig() {
    try {
      const snap = await db.ref("settings/ranks").get();
      if (snap.exists()) {
        const data = snap.val();
        const arr = (Array.isArray(data) ? data : Object.values(data)).filter(Boolean);
        arr.sort((a, b) => a.min - b.min);
        if (arr.length) {
          ranksConfig.length = 0;
          arr.forEach(r => ranksConfig.push(r));
        }
      } else {
        await db.ref("settings/ranks").set(ranksConfig);
      }
    } catch (e) { console.error("Error cargando rangos:", e); }
  }

  // K-POINTS: número de semana ISO (ej. "2026-W27"), usado para la racha semanal
  function obtenerSemanaISO(date) {
    const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
    d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
    const inicioAnio = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
    const semana = Math.ceil((((d - inicioAnio) / 86400000) + 1) / 7);
    return d.getUTCFullYear() + "-W" + semana;
  }

  function formatoFechaCorta(iso) {
    if (!iso) return "";
    const [y, m, d] = iso.split("-");
    return d + "/" + m;

  function generarCodigoUnico() {
    return new Promise(async (resolve) => {
      let code, existe = true;
      while (existe) {
        code = "KB" + Math.floor(10000 + Math.random() * 90000);
        const s = await db.ref("codesIndex/" + code).get();
        existe = s.exists();
      }
      resolve(code);
    });
  }

  async function cargarOCrearUsuario(user) {
    await cargarSettings(); // asegura que pointsConversion, birthdayBonus y los rangos estén al día
    const ref = db.ref("users/" + user.uid);
    const snap = await ref.get();
    if (!snap.exists()) {
      const code = await generarCodigoUnico();
      const nuevo = {
        uid: user.uid,
        nombre: user.displayName || "",
        correo: user.email || "",
        foto: user.photoURL || "",
        fechaCreacion: Date.now(),
        codigo: code,
        puntos: 0,
        rango: ranksConfig[0].name,
        pedidos: 0,
        montoGastado: 0,
        puntosTransferidos: 0,
        puntosRecibidos: 0,
        estado: "activo"
      };
      await ref.set(nuevo);
      await db.ref("codesIndex/" + code).set(user.uid);
      userData = nuevo;
    } else {
      userData = snap.val();
    }
    isAdmin = (user.email === ADMIN_EMAIL);
    document.getElementById("adminFab").style.display = isAdmin ? "flex" : "none";
    actualizarTopbarUI();
    escucharPuntosRealtime();
    if (!isAdmin) revisarCumpleanos();
  }

  // K-POINTS: si hoy es el cumpleaños del cliente y todavía no recibió el bono este año, se lo regala automáticamente
  async function revisarCumpleanos() {
    if (!currentUser || !userData || !userData.fechaNacimiento) return;
    const partes = userData.fechaNacimiento.split("-");
    if (partes.length !== 3) return;
    const mesNac = parseInt(partes[1]);
    const diaNac = parseInt(partes[2]);
    const hoy = new Date();
    const esHoy = (hoy.getMonth() + 1 === mesNac) && (hoy.getDate() === diaNac);
    const anioActual = hoy.getFullYear();
    if (!esHoy || userData.ultimoBonoCumpleanos === anioActual) return;
    try {
      await db.ref("users/" + currentUser.uid + "/puntos").transaction(p => (p || 0) + birthdayBonus);
      await db.ref("users/" + currentUser.uid + "/ultimoBonoCumpleanos").set(anioActual);
      await db.ref("users/" + currentUser.uid + "/historial").push({ tipo: "cumpleanos", puntos: birthdayBonus, fecha: Date.now() });
      userData.ultimoBonoCumpleanos = anioActual;
      setTimeout(() => alert("🎉🎂 ¡Feliz cumpleaños, " + (userData.nombre || "").split(" ")[0] + "! Te regalamos " + birthdayBonus + " K-POINTS."), 800);
    } catch (e) { console.error("Error al otorgar bono de cumpleaños:", e); }
  }

  function escucharPuntosRealtime() {
    if (!currentUser) return;
    db.ref("users/" + currentUser.uid + "/puntos").on("value", snap => {
      const p = snap.val() || 0;
      if (userData) userData.puntos = p;
      // K-POINTS: la cuenta admin tiene puntos infinitos (solo en pantalla; nunca se descuentan)
      if (isAdmin) {
        document.getElementById("topbarPuntos").textContent = "∞";
        document.getElementById("topbarRango").textContent = "👑 Administrador";
        return;

      document.getElementById("topbarPuntos").textContent = p.toLocaleString("es-CL");
      const rango = calcularRango(p);
      document.getElementById("topbarRango").textContent = rango.icon + " " + rango.name;
      if (userData && userData.rango !== rango.name) {
        userData.rango = rango.name;
        db.ref("users/" + currentUser.uid + "/rango").set(rango.name);
      }
    });
  }

  function abrirTransferencia() {
    if (!currentUser || !userData) return;
    const saldoTexto = isAdmin ? "∞ (ilimitados)" : (userData.puntos || 0).toLocaleString("es-CL");
    const ov = crearOverlay();
    ov.innerHTML = `

        <label class="modal-input-label">CANTIDAD</label>

        <button class="modal-btn" id="btnConfirmarTransferencia" style="margin-top:1rem;">TRANSFERIR</button>
      </div>`;
    agregarBotonCerrar(ov);
    document.getElementById("btnConfirmarTransferencia").onclick = async () => {
      const codigo = document.getElementById("destCodigo").value.trim().toUpperCase();
      const cantidad = parseInt(document.getElementById("destCantidad").value);
      if (!codigo || !cantidad || cantidad <= 0) return alert("Completa todos los campos.");
      if (codigo === userData.codigo) return alert("No puedes transferirte a ti mismo.");
      // K-POINTS: sin restricción de saldo — cualquier usuario puede transferir la cantidad que quiera.
      try {
        const destUidSnap = await db.ref("codesIndex/" + codigo).get();
        if (!destUidSnap.exists()) return alert("Código no encontrado.");
        const destUid = destUidSnap.val();
        // La cuenta admin tiene K-POINTS infinitos: nunca se le descuenta saldo al transferir.
        if (!isAdmin) {
          await db.ref("users/" + currentUser.uid + "/puntos").transaction(p => (p || 0) - cantidad);
          await db.ref("users/" + currentUser.uid + "/puntosTransferidos").transaction(p => (p || 0) + cantidad);
        }
        await db.ref("users/" + destUid + "/puntos").transaction(p => (p || 0) + cantidad);
        await db.ref("users/" + destUid + "/puntosRecibidos").transaction(p => (p || 0) + cantidad);
        await db.ref("transfers").push({ de: userData.codigo, para: codigo, cantidad, fecha: Date.now() });
        await db.ref("users/" + currentUser.uid + "/historial").push({ tipo: "transferencia_enviada", cantidad, para: codigo, fecha: Date.now() });
        await db.ref("users/" + destUid + "/historial").push({ tipo: "transferencia_recibida", cantidad, de: userData.codigo, fecha: Date.now() });
        showToast("✅ Transferencia realizada");
        document.body.removeChild(ov);
      } catch (e) { alert("Error al transferir: " + e.message); }
    };
  }

        <div class="admin-tabs">
          <button class="admin-tab-btn active" data-tab="pendientes">Pendientes</button>
          <button class="admin-tab-btn" data-tab="buscar">Buscar Cliente</button>
          <button class="admin-tab-btn" data-tab="transferencias">Transferencias</button>
          <button class="admin-tab-btn" data-tab="config">Config</button>
        </div>
        <div id="adminContenido"></div>
        <button class="modal-btn" id="btnCerrarAdmin" style="margin-top:1rem;">CERRAR</button>
      </div>`;
    agregarBotonCerrar(ov);
    cargarEstadisticasAdmin();
    cargarPendientesAdmin();
    ov.querySelectorAll(".admin-tab-btn").forEach(btn => {
      btn.onclick = () => {
        ov.querySelectorAll(".admin-tab-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        const tab = btn.dataset.tab;
        if (tab === "pendientes") cargarPendientesAdmin();
        if (tab === "buscar") mostrarBuscadorAdmin();
        if (tab === "transferencias") cargarTransferenciasAdmin();
        if (tab === "config") mostrarConfigAdmin();
      };
    });
    document.getElementById("btnCerrarAdmin").onclick = () => document.body.removeChild(ov);
  }

  async function cargarEstadisticasAdmin() {
    const el = document.getElementById("adminStats");
    try {
      const usersSnap = await db.ref("users").get();
      const users = usersSnap.val() || {};
      const totalUsuarios = Object.keys(users).length;
      const totalPuntos = Object.values(users).reduce((s, u) => s + (u.puntos || 0), 0);
      const pendSnap = await db.ref("pendingPoints").get();
      const pend = pendSnap.val() || {};
      const pendientesCount = Object.values(pend).filter(p => p.estado === "pendiente").length;
      const transfSnap = await db.ref("transfers").get();
      const transfCount = transfSnap.exists() ? Object.keys(transfSnap.val()).length : 0;
      if (!el) return;
      el.innerHTML = `
        <div class="stat-card"><div class="stat-num">${totalUsuarios}</div><div class="stat-label">Usuarios</div></div>
        <div class="stat-card"><div class="stat-num">${totalPuntos.toLocaleString("es-CL")}</div><div class="stat-label">Puntos entregados</div></div>
        <div class="stat-card"><div class="stat-num">${pendientesCount}</div><div class="stat-label">Pedidos pendientes</div></div>
        <div class="stat-card"><div class="stat-num">${transfCount}</div><div class="stat-label">Transferencias</div></div>`;
    } catch (e) {
      if (el) el.innerHTML = `<p style="color:var(--red);font-size:0.8rem;grid-column:1/-1;text-align:center;">❌ ${e.message}</p>`;
    }
  }

  async function cargarPendientesAdmin() {
    const cont = document.getElementById("adminContenido");
    if (!cont) return;
    cont.innerHTML = '<p style="text-align:center;color:var(--muted);">Cargando...</p>';
    const snap = await db.ref("pendingPoints").get();
    const data = snap.val() || {};
    const items = Object.entries(data).filter(([id, p]) => p.estado === "pendiente")
      .sort((a, b) => b[1].fecha - a[1].fecha);
    if (items.length === 0) {
      cont.innerHTML = '<p style="text-align:center;color:var(--muted);padding:1rem;">No hay pedidos pendientes 🎉</p>';
      return;
    }
    cont.innerHTML = items.map(([id, p]) => `
      <div class="pending-item">
        <div><b>${p.nombre || ""}</b> · ${p.codigo || ""}</div>
        <div style="color:var(--muted);font-size:0.78rem;">${p.origen === "pedidosya" ? "PedidosYa · N° " + p.numeroPedido : (p.modo || "Web")} · ${new Date(p.fecha).toLocaleString("es-CL")}</div>
        <div style="color:var(--accent);font-weight:700;">$${(p.monto || 0).toLocaleString("es-CL")} → +${p.puntos} pts</div>
        <div style="display:flex;gap:8px;margin-top:6px;">
          <button class="modal-btn" style="padding:0.5rem;font-size:0.9rem;flex:1;margin:0;" onclick="aprobarPendiente('${id}')">Aprobar ✓</button>
          <button class="btn-limpiar" style="flex:1;" onclick="rechazarPendiente('${id}')">Rechazar ✕</button>
        </div>
      </div>`).join("");
  }

  async function aprobarPendiente(id) {
    const ref = db.ref("pendingPoints/" + id);
    const snap = await ref.get();
    const p = snap.val();
    if (!p) return;
    const uidSnap = await db.ref("codesIndex/" + p.codigo).get();
    if (!uidSnap.exists()) return alert("No se encontró el usuario.");
    const uid = uidSnap.val();
    await db.ref("users/" + uid + "/puntos").transaction(v => (v || 0) + p.puntos);
    await db.ref("users/" + uid + "/pedidos").transaction(v => (v || 0) + 1);
    await db.ref("users/" + uid + "/montoGastado").transaction(v => (v || 0) + p.monto);
    await db.ref("users/" + uid + "/historial").push({ tipo: "puntos_aprobados", puntos: p.puntos, monto: p.monto, fecha: Date.now() });
    await actualizarRachaSemanal(uid);
    await ref.update({ estado: "aprobado", fechaAprobacion: Date.now() });
    await db.ref("transactions").push({ tipo: "aprobacion", codigo: p.codigo, puntos: p.puntos, admin: currentUser.email, fecha: Date.now() });
    cargarPendientesAdmin(); cargarEstadisticasAdmin();
  }

  // K-POINTS: racha semanal — se llama cada vez que se aprueba una compra.
  // Si la semana anterior con compra fue la inmediatamente anterior a esta, suma +1.
  // Si hubo una semana sin comprar en el medio, la racha vuelve a partir de 1.
  async function actualizarRachaSemanal(uid) {
    try {
      const uSnap = await db.ref("users/" + uid).get();
      const u = uSnap.val() || {};
      const semanaActual = obtenerSemanaISO(new Date());
      if (u.ultimaSemanaCompra === semanaActual) return; // ya se contó esta semana
      let nuevaRacha = 1;
      if (u.ultimaSemanaCompra) {
        const [anioU, wU] = u.ultimaSemanaCompra.split("-W").map(Number);
        const [anioA, wA] = semanaActual.split("-W").map(Number);
        const esConsecutiva = (anioU === anioA && wA === wU + 1) || (anioA === anioU + 1 && wU >= 52 && wA === 1);
        nuevaRacha = esConsecutiva ? (u.racha || 0) + 1 : 1;
      }
      await db.ref("users/" + uid).update({ racha: nuevaRacha, ultimaSemanaCompra: semanaActual });
    } catch (e) { console.error("Error actualizando racha:", e); }
  }

  async function rechazarPendiente(id) {
    if (!confirm("¿Rechazar este pedido?")) return;
    await db.ref("pendingPoints/" + id).update({ estado: "rechazado", fechaRechazo: Date.now() });
    cargarPendientesAdmin(); cargarEstadisticasAdmin();
  }

  function mostrarBuscadorAdmin() {
    const cont = document.getElementById("adminContenido");
    if (!cont) return;
    cont.innerHTML = `
      <input class="modal-input" id="buscarInput" placeholder="Nombre, correo o código KBROS" style="margin-bottom:0.6rem;">
      <button class="modal-btn" id="btnBuscarCliente" style="margin-top:0;margin-bottom:0.9rem;">🔍 BUSCAR</button>
      <div id="resultadosBusqueda"></div>`;
    document.getElementById("btnBuscarCliente").onclick = ejecutarBusquedaAdminClientes;
    document.getElementById("buscarInput").onkeydown = (e) => {
      if (e.key === "Enter") ejecutarBusquedaAdminClientes();
    };
  }

  // K-POINTS: separada de mostrarBuscadorAdmin() para poder refrescar los resultados
  // (ej. después de sumar/restar puntos) sin borrar lo que el admin escribió.
  async function ejecutarBusquedaAdminClientes() {
    const inputEl = document.getElementById("buscarInput");
    const cont2 = document.getElementById("resultadosBusqueda");
    if (!inputEl || !cont2) return;
    const q = inputEl.value.trim().toLowerCase();
    if (q.length < 2) { cont2.innerHTML = '<p style="color:var(--muted);text-align:center;">Escribe al menos 2 caracteres.</p>'; return; }
    cont2.innerHTML = '<p style="text-align:center;color:var(--muted);">Buscando...</p>';
    try {
      const snap = await db.ref("users").get();
      const users = snap.val() || {};
      const resultados = Object.entries(users).filter(([uid, u]) =>
        (u.nombre || "").toLowerCase().includes(q) ||
        (u.correo || "").toLowerCase().includes(q) ||
        (u.codigo || "").toLowerCase().includes(q));
      cont2.innerHTML = resultados.map(([uid, u]) => `
        <div class="pending-item" style="cursor:pointer;" onclick="abrirFichaClienteAdmin('${u.codigo}')">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;">
            <div style="display:flex;align-items:center;gap:10px;">
              <img src="${u.foto}" style="width:36px;height:36px;border-radius:50%;">
              <div><b>${u.nombre}</b><br><span style="color:var(--muted);font-size:0.76rem;">${u.codigo} · ⭐ ${(u.puntos || 0).toLocaleString("es-CL")}</span></div>
            </div>
            <span style="color:var(--muted);">▸</span>
          </div>
        </div>`).join("") || '<p style="color:var(--muted);text-align:center;">Sin resultados</p>';
    } catch (e) {
      cont2.innerHTML = `<p style="color:var(--red);text-align:center;padding:1rem;font-size:0.85rem;">❌ Error al buscar: ${e.message}<br><span style="color:var(--muted);font-size:0.75rem;">Puede ser un problema de permisos en las reglas de Firebase.</span></p>`;
    }
  }

  // K-POINTS: ficha del cliente con el mismo diseño de "Mi perfil", pero con controles
  // para que el admin sume o reste K-POINTS directamente.
  async function abrirFichaClienteAdmin(codigo) {
    let u;
    try {
      const uidSnap = await db.ref("codesIndex/" + codigo).get();
      if (!uidSnap.exists()) return alert("Cliente no encontrado.");
      const uid = uidSnap.val();
      const snap = await db.ref("users/" + uid).get();
      if (!snap.exists()) return alert("No se encontraron datos del cliente.");
      u = snap.val();
    } catch (e) {
      return alert("Error al abrir la ficha: " + e.message);
    }
    const esAdminCliente = u.correo === ADMIN_EMAIL;
    const rango = calcularRango(u.puntos || 0);
    const rangoTexto = esAdminCliente ? "👑 Administrador" : (rango.icon + " " + rango.name);
    const puntosTexto = esAdminCliente ? "∞" : (u.puntos || 0).toLocaleString("es-CL");
    const ov = crearOverlay();
    ov.innerHTML = `
      <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-title">FICHA DEL CLIENTE</div>
        <div style="text-align:center;">
          <img src="${u.foto}" style="width:80px;height:80px;border-radius:50%;border:3px solid var(--accent);margin-bottom:0.8rem;">
          <div style="font-weight:700;font-size:1.1rem;">${u.nombre}</div>
          <div style="color:var(--muted);font-size:0.85rem;margin-bottom:0.6rem;">${u.correo}</div>
          <div class="rank-badge">${rangoTexto}</div>
          <div style="font-family:'Bebas Neue';font-size:2rem;color:var(--accent);">⭐ ${puntosTexto}</div>
          <div style="color:var(--muted);font-size:0.8rem;margin-bottom:1rem;">K-POINTS disponibles</div>
          <div style="background:var(--surface2);border-radius:14px;padding:1rem;margin-bottom:1rem;">
            <div style="font-size:0.78rem;color:var(--muted);margin-bottom:0.5rem;">CÓDIGO KBROS</div>
            <div style="font-family:'Bebas Neue';font-size:1.6rem;letter-spacing:3px;">${u.codigo}</div>
          </div>
          <div id="qrContainerFicha" style="display:flex;justify-content:center;margin-bottom:0.5rem;"></div>
        </div>
        ${esAdminCliente ? "" : `
        <div style="border-top:1px solid var(--border);padding-top:1rem;margin-top:0.5rem;">
          <div style="font-size:0.8rem;color:var(--muted);margin-bottom:0.6rem;text-align:center;">AJUSTAR K-POINTS</div>
          <div class="admin-quick-btns" style="justify-content:center;">
            <button class="plus" data-cant="50">+50</button>
            <button class="plus" data-cant="100">+100</button>
            <button class="plus" data-cant="500">+500</button>
            <button class="plus" data-cant="1000">+1000</button>
            <button class="minus" data-cant="-50">-50</button>
            <button class="minus" data-cant="-100">-100</button>
            <button class="minus" data-cant="-500">-500</button>
            <button class="minus" data-cant="-1000">-1000</button>
          </div>
          <button class="modal-btn" id="btnAjusteCustomFicha" style="margin-top:0.8rem;background:var(--surface2);color:var(--text);box-shadow:none;">CANTIDAD PERSONALIZADA</button>
        </div>`}
        <button class="modal-btn" id="btnCerrarFicha" style="margin-top:1rem;">CERRAR</button>
      </div>`;
    agregarBotonCerrar(ov);
    try {
      new QRCode(document.getElementById("qrContainerFicha"), {
        text: u.codigo, width: 150, height: 150, colorDark: "#0c0c0e", colorLight: "#ffffff"
      });
    } catch (e) { console.error("QR error:", e); }
    document.getElementById("btnCerrarFicha").onclick = () => document.body.removeChild(ov);
    if (!esAdminCliente) {
      ov.querySelectorAll(".admin-quick-btns button").forEach(btn => {
        btn.onclick = async () => {
          const cant = parseInt(btn.dataset.cant);
          await ajustarPuntos(u.codigo, cant);
          document.body.removeChild(ov);
          abrirFichaClienteAdmin(u.codigo);
        };
      });
      document.getElementById("btnAjusteCustomFicha").onclick = async () => {
        const cantidad = parseInt(prompt("¿Cuántos K-POINTS? (usa negativo para descontar)"));
        if (!cantidad) return;
        const motivo = prompt("Motivo del ajuste (opcional)") || "";
        await ajustarPuntos(u.codigo, cantidad, motivo);
        document.body.removeChild(ov);
        abrirFichaClienteAdmin(u.codigo);
      };
    }
  }

  async function ajustarPuntos(codigo, cantidad, motivo) {
    const uidSnap = await db.ref("codesIndex/" + codigo).get();
    if (!uidSnap.exists()) return alert("Código no encontrado.");
    const uid = uidSnap.val();
    await db.ref("users/" + uid + "/puntos").transaction(v => Math.max(0, (v || 0) + cantidad));
    await db.ref("users/" + uid + "/historial").push({ tipo: cantidad > 0 ? "bonificacion" : "descuento", cantidad, motivo: motivo || "Ajuste manual admin", fecha: Date.now() });
    await db.ref("transactions").push({ tipo: "ajuste_manual", codigo, cantidad, admin: currentUser.email, motivo: motivo || "", fecha: Date.now() });
    showToast(cantidad > 0 ? `+${cantidad} pts a ${codigo}` : `${cantidad} pts a ${codigo}`);
    ejecutarBusquedaAdminClientes();
  }

  function ajustarPuntosCustom(codigo) {
    const cantidad = parseInt(prompt("¿Cuántos K-POINTS? (usa negativo para descontar)"));
    if (!cantidad) return;
    const motivo = prompt("Motivo del ajuste (opcional)") || "";
    ajustarPuntos(codigo, cantidad, motivo);
  }

  async function cargarTransferenciasAdmin() {
    const cont = document.getElementById("adminContenido");
    if (!cont) return;
    const snap = await db.ref("transfers").limitToLast(30).get();
    const data = snap.val() || {};
    const items = Object.values(data).reverse();
    cont.innerHTML = items.length ? items.map(t => `
      <div class="pending-item">
        <div>${t.de} → ${t.para}</div>
        <div style="color:var(--accent);font-weight:700;">${t.cantidad} pts</div>
        <div style="color:var(--muted);font-size:0.76rem;">${new Date(t.fecha).toLocaleString("es-CL")}</div>
      </div>`).join("") : '<p style="color:var(--muted);text-align:center;">Sin transferencias aún</p>';
  }

  // K-POINTS: Panel de Configuración — permite editar la conversión, el bono de
  // cumpleaños y los rangos, todo sin tocar código.
  function mostrarConfigAdmin() {
    const cont = document.getElementById("adminContenido");
    if (!cont) return;
    cont.innerHTML = `
      <label class="modal-input-label">CONVERSIÓN: $ CLP POR 1 K-POINT</label>
      <input class="modal-input" id="cfgConversion" type="number" value="${pointsConversion}">
      <label class="modal-input-label">BONO DE CUMPLEAÑOS (K-POINTS)</label>
      <input class="modal-input" id="cfgCumple" type="number" value="${birthdayBonus}">
      <div style="font-size:0.8rem;color:var(--muted);margin:1.2rem 0 0.5rem;">RANGOS (de menor a mayor)</div>
      <div id="cfgRangos"></div>
      <button type="button" class="modal-btn" id="btnAgregarRango" style="margin-top:0.6rem;background:var(--surface2);color:var(--text);box-shadow:none;">+ AGREGAR RANGO</button>
      <button class="modal-btn" id="btnGuardarConfig" style="margin-top:1.2rem;">GUARDAR CAMBIOS</button>
      <p style="font-size:0.72rem;color:var(--muted);text-align:center;margin-top:0.6rem;">Ícono: cualquier emoji · Nombre: texto libre · Mínimo: K-POINTS necesarios para llegar a ese rango</p>`;
    pintarFilasRangos(ranksConfig);
    document.getElementById("btnAgregarRango").onclick = () => agregarFilaRango({ icon: "⭐", name: "Nuevo rango", min: 0 });
    document.getElementById("btnGuardarConfig").onclick = async () => {
      const nuevaConversion = parseInt(document.getElementById("cfgConversion").value) || pointsConversion;
      const nuevoCumple = parseInt(document.getElementById("cfgCumple").value);
      const rangosFinal = leerRangosDesdeFilas();
      if (rangosFinal.length === 0) return alert("Debe quedar al menos un rango.");
      try {
        await db.ref("settings").update({ pointsPerClp: nuevaConversion, bonoCumpleanos: isNaN(nuevoCumple) ? birthdayBonus : nuevoCumple });
        await db.ref("settings/ranks").set(rangosFinal);
        pointsConversion = nuevaConversion;
        birthdayBonus = isNaN(nuevoCumple) ? birthdayBonus : nuevoCumple;
        ranksConfig.length = 0;
        rangosFinal.forEach(r => ranksConfig.push(r));
        showToast("✅ Configuración guardada");
      } catch (e) { alert("Error al guardar: " + e.message); }
    };
  }

  function pintarFilasRangos(lista) {
    const cont = document.getElementById("cfgRangos");
    cont.innerHTML = "";
    lista.forEach(r => agregarFilaRango(r));
  }

  function agregarFilaRango(r) {
    const cont = document.getElementById("cfgRangos");
    const div = document.createElement("div");
    div.className = "rango-row";
    div.style = "display:flex;gap:6px;margin-bottom:6px;align-items:center;";
    div.innerHTML = `
      <input class="modal-input rango-icon" value="${r.icon}" style="width:50px;text-align:center;padding:0.6rem 0.3rem;">
      <input class="modal-input rango-name" value="${r.name}" style="flex:1;padding:0.6rem;">
      <input class="modal-input rango-min" type="number" value="${r.min}" style="width:85px;padding:0.6rem;">
      <button type="button" class="btn-limpiar" style="padding:0.5rem;" onclick="this.closest('.rango-row').remove()">✕</button>`;
    cont.appendChild(div);
  }

  function leerRangosDesdeFilas() {
    const filas = document.querySelectorAll("#cfgRangos .rango-row");
    const arr = [];
    filas.forEach(f => {
      const icon = f.querySelector(".rango-icon").value.trim() || "⭐";
      const name = f.querySelector(".rango-name").value.trim() || "Rango";
      const min = parseInt(f.querySelector(".rango-min").value) || 0;
      arr.push({ icon, name, min });
    });
    arr.sort((a, b) => a.min - b.min);
    return arr;
  }

  // ---------- INICIO ----------
  renderMenu();
  syncFirebase();
  renderTotal();
  cargarSettings();
</script>
</body>
</html>
