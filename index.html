<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>✌ KBROS 😎</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --bg: #0c0c0e;
      --surface: #141417;
      --surface2: #1c1c21;
      --surface3: #242429;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.13);
      --text: #f0f0f2;
      --muted: #888892;
      --accent: #ff6b2b;
      --accent2: #ff9f1c;
      --green: #2ecc71;
      --red: #ff4757;
      --glow: rgba(255,107,43,0.25);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* BG noise texture */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: 0.4;
    }

    /* HEADER */
    header {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 1.5rem;
      background: linear-gradient(180deg, #161618 0%, transparent 100%);
      border-bottom: 1px solid var(--border);
      z-index: 2;
    }
    .logo-wrap {
      position: relative;
      cursor: pointer;
      user-select: none;
    }
    .logo-wrap img {
      max-width: 200px;
      width: 70vw;
      height: auto;
      border-radius: 16px;
      display: block;
      filter: drop-shadow(0 0 28px rgba(255,107,43,0.35));
      transition: filter 0.3s, transform 0.3s;
    }
    .logo-wrap:hover img { filter: drop-shadow(0 0 38px rgba(255,107,43,0.55)); transform: scale(1.03); }
    .logo-tagline {
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 6px;
      font-size: 0.85rem;
      color: var(--accent);
      text-align: center;
      margin-top: 0.6rem;
      opacity: 0.85;
    }

    /* TOP STATS */
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      padding: 0.9rem 1rem;
      z-index: 2;
      position: relative;
    }
    .stat-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 999px;
      padding: 0.45rem 1rem;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .stat-chip:active { transform: scale(0.95); }
    .stat-chip.cart-chip { border-color: rgba(255,107,43,0.4); }
    .stat-chip.cart-chip:hover { background: rgba(255,107,43,0.1); border-color: var(--accent); }
    .stat-chip.like-chip:hover { background: rgba(255,71,87,0.1); border-color: var(--red); }
    .chip-count { font-weight: 700; font-size: 0.95rem; }

    /* MENU TOGGLE */
    .menu-toggle-wrap {
      display: flex;
      justify-content: center;
      padding: 0 1rem 1rem;
      z-index: 2;
      position: relative;
    }
    .menu-toggle-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 0.85rem 2.5rem;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 3px;
      cursor: pointer;
      box-shadow: 0 4px 24px var(--glow);
      transition: transform 0.15s, box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .menu-toggle-btn:active { transform: scale(0.96); }

    /* MENU */
    #menu {
      padding-bottom: 110px;
      z-index: 2;
      position: relative;
    }

    /* CATEGORIA */
    .categoria-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.2rem;
      background: var(--surface);
      border-top: 1px solid var(--border);
      cursor: pointer;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 2px;
      color: var(--text);
      transition: background 0.2s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .categoria-btn:hover { background: var(--surface2); }
    .categoria-btn.active { background: var(--surface2); color: var(--accent); border-top-color: var(--accent); }
    .cat-arrow {
      font-size: 0.7rem;
      color: var(--muted);
      transition: transform 0.25s;
    }
    .categoria-btn.active .cat-arrow { transform: rotate(90deg); color: var(--accent); }

    /* PRODUCTOS GRID */
    .productos {
      display: none;
      flex-wrap: wrap;
      padding: 0.7rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      animation: fadeSlide 0.22s ease;
    }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .producto {
      width: calc(50% - 0.5rem);
      margin: 0.25rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.85rem 0.7rem;
      cursor: pointer;
      font-size: 0.82rem;
      text-align: center;
      color: var(--text);
      transition: background 0.15s, border-color 0.15s, transform 0.12s;
      position: relative;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }
    .producto::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,107,43,0.06), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .producto:hover { border-color: rgba(255,107,43,0.4); background: var(--surface3); }
    .producto:hover::before { opacity: 1; }
    .producto:active { transform: scale(0.96); background: var(--surface3); }
    .prod-nombre { font-weight: 500; line-height: 1.3; margin-bottom: 0.4rem; }
    .prod-precio {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      color: var(--accent);
      letter-spacing: 1px;
    }
    .producto.flash {
      animation: prodFlash 0.4s ease;
    }
    @keyframes prodFlash {
      0%   { background: var(--surface2); }
      40%  { background: rgba(255,107,43,0.22); border-color: var(--accent); }
      100% { background: var(--surface2); }
    }

    /* CARRITO DETALLE */
    #carrito-detalle {
      display: none;
      padding: 1rem 1rem 0.5rem;
      background: var(--surface);
      border-top: 1px solid var(--border);
      z-index: 2;
      position: relative;
      animation: fadeSlide 0.2s ease;
    }
    #carrito-detalle h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 2px;
      color: var(--accent);
      margin-bottom: 0.6rem;
    }
    #detalleItems { list-style: none; }
    #detalleItems li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.88rem;
      gap: 0.5rem;
    }
    #detalleItems li:last-child { border-bottom: none; }
    .item-info { flex: 1; }
    .item-nombre { font-weight: 500; }
    .item-precio { color: var(--accent); font-weight: 600; font-size: 0.9rem; }
    .item-controls { display: flex; align-items: center; gap: 4px; }
    .item-controls button {
      width: 28px; height: 28px;
      border-radius: 8px;
      border: 1px solid var(--border2);
      background: var(--surface3);
      color: var(--text);
      font-size: 0.9rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .item-controls button:hover { background: var(--accent); border-color: var(--accent); }
    .item-qty {
      font-weight: 700;
      min-width: 20px;
      text-align: center;
      font-size: 0.95rem;
    }

    /* CARRITO FIJO */
    .carrito-fijo {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(18, 18, 20, 0.95);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-top: 1px solid var(--border2);
      padding: 0.8rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      z-index: 100;
      box-shadow: 0 -8px 32px rgba(0,0,0,0.5);
    }
    .btn-limpiar {
      background: transparent;
      border: 1px solid rgba(255,71,87,0.4);
      color: var(--red);
      border-radius: 12px;
      padding: 0.75rem 1rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-limpiar:hover { background: rgba(255,71,87,0.12); border-color: var(--red); }
    .total-display {
      flex: 1;
      text-align: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.35rem;
      letter-spacing: 2px;
      color: var(--text);
    }
    .total-display span { color: var(--accent); }
    .btn-pedir {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 12px;
      padding: 0.75rem 1.4rem;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 2px;
      color: #fff;
      cursor: pointer;
      box-shadow: 0 4px 18px var(--glow);
      transition: transform 0.15s, box-shadow 0.2s;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-pedir:active { transform: scale(0.96); }
    .btn-pedir.animar { animation: pedirPulse 1.2s ease infinite; }
    @keyframes pedirPulse {
      0%,100% { box-shadow: 0 4px 18px var(--glow); }
      50% { box-shadow: 0 6px 30px rgba(255,107,43,0.55); transform: translateY(-1px); }
    }

    /* MODAL BASE */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.82);
      backdrop-filter: blur(6px);
      display: flex; align-items: flex-end; justify-content: center;
      z-index: 1000;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal-sheet {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 20px 20px 0 0;
      padding: 1.5rem;
      width: 100%;
      max-width: 480px;
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(60px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }
    .modal-handle {
      width: 40px; height: 4px;
      background: var(--border2);
      border-radius: 99px;
      margin: 0 auto 1.2rem;
    }
    .modal-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 3px;
      color: var(--text);
      text-align: center;
      margin-bottom: 1.2rem;
    }
    .modal-option {
      display: flex; align-items: center; gap: 1rem;
      background: var(--surface2);
      border: 2px solid var(--border);
      border-radius: 14px;
      padding: 1rem 1.2rem;
      margin-bottom: 0.8rem;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .modal-option:hover, .modal-option.selected {
      border-color: var(--accent);
      background: rgba(255,107,43,0.08);
    }
    .modal-option input[type=radio] { display: none; }
    .modal-opt-icon { font-size: 1.8rem; }
    .modal-opt-text { flex: 1; }
    .modal-opt-title { font-weight: 600; font-size: 1rem; }
    .modal-opt-sub { font-size: 0.82rem; color: var(--muted); margin-top: 2px; }
    .modal-check {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2px solid var(--border2);
      transition: background 0.2s, border-color 0.2s;
    }
    .modal-option.selected .modal-check {
      background: var(--accent);
      border-color: var(--accent);
    }
    .modal-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 14px;
      padding: 1rem;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 3px;
      color: #fff;
      cursor: pointer;
      margin-top: 0.5rem;
      box-shadow: 0 4px 20px var(--glow);
      transition: transform 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .modal-btn:active { transform: scale(0.97); }
    .modal-input-label {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 500;
      margin-bottom: 0.4rem;
      margin-top: 0.8rem;
      display: block;
      letter-spacing: 0.5px;
    }
    .modal-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 12px;
      padding: 0.85rem 1rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .modal-input:focus { border-color: var(--accent); }
    .modal-input::placeholder { color: var(--muted); }

    /* TOAST */
    #toast {
      position: fixed;
      top: 1rem; left: 50%;
      transform: translateX(-50%);
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 999px;
      padding: 0.55rem 1.2rem;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text);
      z-index: 999;
      display: none;
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    /* LOGO ANIMATIONS */
    @keyframes shake { 0%{transform:rotate(0)} 25%{transform:rotate(6deg)} 50%{transform:rotate(-6deg)} 75%{transform:rotate(4deg)} 100%{transform:rotate(0)} }
    @keyframes spin { from{transform:rotate(0)} to{transform:rotate(360deg)} }
    @keyframes zoom { 0%,100%{transform:scale(1)} 50%{transform:scale(1.12)} }
    @keyframes bounce-logo { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
    .logo-anim { animation-duration: 0.6s; animation-fill-mode: both; }
  </style>
</head>
<body>

  <header>
    <div class="logo-wrap" onclick="animarLogo()">
      <img src="https://kbrossnbk.github.io/kbros-pedidos/d84b860d-022c-4639-b528-f66330c3c0ef.PNG"
           id="logoKBROS" alt="KBROS Logo"/>
    </div>
    <div class="logo-tagline">🆕</div>
  </header>

  <div class="stats-bar">
    <div class="stat-chip cart-chip" onclick="feedbackBoton(this); mostrarDetalleCarrito(true)">
      🛒 <span class="chip-count" id="contadorCarrito">0</span>
    </div>
    <div class="stat-chip like-chip" id="botonLike" onclick="sumarLike()">
      ❤️ <span class="chip-count" id="contadorLikes">0</span>
    </div>
    <div class="stat-chip">
      👁 <span class="chip-count" id="contadorUsuarios">0</span>
    </div>
  </div>

  <div class="menu-toggle-wrap">
    <button class="menu-toggle-btn" onclick="feedbackBoton(this); toggleMenu()">VER MENÚ 😋</button>
  </div>

  <div id="menu"></div>

  <div id="carrito-detalle">
    <h3>🛒 TU PEDIDO</h3>
    <ul id="detalleItems"></ul>
  </div>

  <div id="toast"></div>

  <div class="carrito-fijo">
    <button class="btn-limpiar" onclick="limpiarCarrito()">Limpiar</button>
    <div class="total-display" id="total">$<span>0</span></div>
    <button class="btn-pedir" id="btnPedir" onclick="enviarPedido()">PEDIR 🚀</button>
  </div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDR-LnHsJ54kj-5vRzB3NoK-EB-ELD9xQs",
    authDomain: "kbros-web.firebaseapp.com",
    databaseURL: "https://kbros-web-default-rtdb.firebaseio.com",
    projectId: "kbros-web",
    storageBucket: "kbros-web.firebasestorage.com",
    messagingSenderId: "281753184526",
    appId: "1:281753184526:web:c6e824fefd7b261a428f5f"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  let carrito = [];
  let menuVisible = false;

  function toggleMenu() {
    const menu = document.getElementById("menu");
    menu.style.display = menuVisible ? "none" : "block";
    menuVisible = !menuVisible;
  }

  function feedbackBoton(el) {
    if (!el) return;
    el.classList.add("clickeado");
    setTimeout(() => el.classList.remove("clickeado"), 200);
  }

  function agregar(nombre, precio, el) {
    const item = carrito.find(p => p.nombre === nombre);
    if (item) item.cantidad++;
    else carrito.push({ nombre, precio, cantidad: 1 });
    renderTotal();
    if (el) {
      el.classList.add("flash");
      setTimeout(() => el.classList.remove("flash"), 400);
    }
    showToast("➕ " + nombre.split(" ")[0]);
  }

  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.style.display = "block";
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.style.display = "none"; }, 1800);
  }

  function renderTotal() {
    const total = carrito.reduce((s, p) => s + p.precio * p.cantidad, 0);
    document.getElementById("total").innerHTML = "$<span>" + total.toLocaleString("es-CL") + "</span>";
    document.getElementById("btnPedir").classList.toggle("animar", total > 0);
    document.getElementById("contadorCarrito").textContent = carrito.reduce((a, b) => a + b.cantidad, 0);
    mostrarDetalleCarrito();
  }

  function mostrarDetalleCarrito(forceShow = false) {
    const lista = document.getElementById("detalleItems");
    const panel = document.getElementById("carrito-detalle");
    lista.innerHTML = '';
    carrito.forEach((p, i) => {
      lista.innerHTML += `
        <li>
          <div class="item-info">
            <div class="item-nombre">${p.nombre}</div>
            <div class="item-precio">$${(p.precio * p.cantidad).toLocaleString("es-CL")}</div>
          </div>
          <div class="item-controls">
            <button onclick="modificarCantidad(${i}, -1)">−</button>
            <span class="item-qty">${p.cantidad}</span>
            <button onclick="modificarCantidad(${i}, 1)">+</button>
          </div>
        </li>`;
    });
    if (forceShow || panel.style.display === "block") {
      panel.style.display = carrito.length > 0 ? "block" : "none";
    }
  }

  function modificarCantidad(index, cambio) {
    carrito[index].cantidad += cambio;
    if (carrito[index].cantidad <= 0) carrito.splice(index, 1);
    renderTotal();
  }

  function limpiarCarrito() {
    carrito = [];
    renderTotal();
    document.getElementById("carrito-detalle").style.display = "none";
  }

  // ---- MODALES ----

  function crearOverlay() {
    const ov = document.createElement("div");
    ov.className = "modal-overlay";
    document.body.appendChild(ov);
    return ov;
  }

  function elegirModoEntrega() {
    return new Promise(resolve => {
      const ov = crearOverlay();
      ov.innerHTML = `
        <div class="modal-sheet">
          <div class="modal-handle"></div>
          <div class="modal-title">¿CÓMO LO QUIERES?</div>
          <div class="modal-option" id="opt-delivery" onclick="seleccionarOpt('delivery')">
            <span class="modal-opt-icon">🛵</span>
            <div class="modal-opt-text">
              <div class="modal-opt-title">Delivery</div>
              <div class="modal-opt-sub">Te lo llevamos a domicilio</div>
            </div>
            <div class="modal-check" id="check-delivery"></div>
          </div>
          <div class="modal-option" id="opt-retiro" onclick="seleccionarOpt('retiro')">
            <span class="modal-opt-icon">🏃</span>
            <div class="modal-opt-text">
              <div class="modal-opt-title">Retiro en local</div>
              <div class="modal-opt-sub">Pasa a buscar tu pedido</div>
            </div>
            <div class="modal-check" id="check-retiro"></div>
          </div>
          <button class="modal-btn" id="btnConfirmarModo">CONFIRMAR</button>
        </div>`;

      let selected = null;
      window.seleccionarOpt = (opt) => {
        selected = opt;
        document.querySelectorAll(".modal-option").forEach(el => el.classList.remove("selected"));
        document.getElementById("opt-" + opt).classList.add("selected");
      };
      document.getElementById("btnConfirmarModo").onclick = () => {
        if (!selected) { alert("Selecciona una opción."); return; }
        document.body.removeChild(ov);
        resolve(selected === "delivery" ? "DELIVERY" : "RETIRO");
      };
    });
  }

  function pedirNombreYContacto() {
    return new Promise(resolve => {
      const ov = crearOverlay();
      ov.innerHTML = `
        <div class="modal-sheet">
          <div class="modal-handle"></div>
          <div class="modal-title">TUS DATOS</div>
          <label class="modal-input-label">NOMBRE</label>
          <input class="modal-input" id="nombreInput" type="text" placeholder="¿Cómo te llamas?" autocomplete="given-name"/>
          <label class="modal-input-label">TELÉFONO (9 dígitos, sin +56)</label>
          <input class="modal-input" id="telefonoInput" type="tel" placeholder="9 1234 5678" maxlength="9"/>
          <button class="modal-btn" style="margin-top:1.2rem" id="btnConfirmarDatos">LISTO ✓</button>
        </div>`;
      document.getElementById("btnConfirmarDatos").onclick = () => {
        const nombre = document.getElementById("nombreInput").value.trim();
        const telefono = document.getElementById("telefonoInput").value.trim();
        if (!nombre) return alert("Ingresa tu nombre.");
        if (!/^\d{9}$/.test(telefono)) return alert("Número inválido. 9 dígitos sin +56.");
        document.body.removeChild(ov);
        resolve({ nombre, telefono });
      };
    });
  }

  function obtenerUbicacionGPS() {
    return new Promise((resolve, reject) => {
      const ov = crearOverlay();
      ov.innerHTML = `
        <div class="modal-sheet" style="border-radius:20px 20px 0 0;">
          <div class="modal-handle"></div>
          <div class="modal-title">📍 TU UBICACIÓN</div>
          <p style="font-size:0.85rem;color:var(--muted);text-align:center;margin-bottom:1rem;">Toca el mapa para marcar dónde quieres tu pedido</p>
          <div id="mapa" style="height:280px;border-radius:14px;overflow:hidden;border:1px solid var(--border2);"></div>
          <button class="modal-btn" id="confirmarUbicacion" style="margin-top:1rem;">CONFIRMAR UBICACIÓN</button>
        </div>`;
      document.body.appendChild(ov);
      const ubicacionKBROS = [-33.6067, -70.6861];
      const mapa = L.map("mapa").setView(ubicacionKBROS, 16);
      L.marker(ubicacionKBROS).addTo(mapa).bindPopup("✌KBROS😎").openPopup();
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { maxZoom: 19 }).addTo(mapa);
      let marcador = null, coordenadas = null;
      mapa.on("click", e => {
        if (marcador) marcador.remove();
        marcador = L.marker(e.latlng).addTo(mapa);
        coordenadas = e.latlng;
      });
      mapa.locate({ setView: true, maxZoom: 17 });
      mapa.on("locationfound", e => L.circle(e.latlng, { radius: 50, color: "#ff6b2b" }).addTo(mapa));
      document.getElementById("confirmarUbicacion").onclick = () => {
        if (!coordenadas) { alert("Toca el mapa para marcar tu ubicación."); return; }
        document.body.removeChild(ov);
        resolve({ lat: coordenadas.lat, lng: coordenadas.lng });
      };
    });
  }

  async function calcularDistanciaAuto(latC, lngC) {
    const local = { lat: -33.60675364336594, lng: -70.68617400931403 };
    const resp = await fetch(`https://router.project-osrm.org/route/v1/driving/${lngC},${latC};${local.lng},${local.lat}?overview=false`);
    const data = await resp.json();
    return data.routes[0].distance / 1000;
  }

  async function enviarPedido() {
    if (carrito.length === 0) return alert("Primero agrega productos al carrito.");
    const modo = await elegirModoEntrega();
    if (!modo) return;
    let costoDelivery = 0, ubicacionCliente = "";
    if (modo === "DELIVERY") {
      try {
        const coords = await obtenerUbicacionGPS();
        ubicacionCliente = `${coords.lat},${coords.lng}`;
        const kmR = Math.round(await calcularDistanciaAuto(coords.lat, coords.lng));
        costoDelivery = kmR <= 1 ? 1700 : 1700 + (kmR - 1) * 300;
      } catch {
        alert("No se pudo obtener tu ubicación."); return;
      }
    }
    const datos = await pedirNombreYContacto();
    const totalPedido = carrito.reduce((s, p) => s + p.precio * p.cantidad, 0);
    const totalFinal = totalPedido + costoDelivery;
    let mensaje = `Soy ${datos.nombre}\nQuiero - ${modo}`;
    if (modo === "DELIVERY") mensaje += `\nUbicación: https://www.google.com/maps?q=${ubicacionCliente}`;
    mensaje += `\nContacto: +56${datos.telefono}\n\nDetalle del pedido:\n`;
    carrito.forEach(p => { mensaje += `• ${p.nombre} x${p.cantidad} = $${p.precio * p.cantidad}\n`; });
    mensaje += `\nSubTotal: $${totalPedido}`;
    if (modo === "DELIVERY") mensaje += `\nDelivery: $${costoDelivery}`;
    mensaje += `\n\nTOTAL: $${totalFinal}`;
    window.open(`https://wa.me/56956446048?text=${encodeURIComponent(mensaje)}`, "_blank");
    limpiarCarrito();
  }

    const el = document.getElementById("botonLike");

      el.style.transform = "scale(0.88)";
      setTimeout(() => { el.style.transform = ""; }, 150);

  function syncFirebase() {
    db.ref("likes").on("value", snap => {
      document.getElementById("contadorLikes").textContent = snap.val() || 0;
    });
    const userRef = db.ref("usuarios").push(true);
    userRef.onDisconnect().remove();
    db.ref("usuarios").on("value", snap => {
      document.getElementById("contadorUsuarios").textContent = snap.numChildren();
    });
    db.ref("colorLike").on("value", snap => {
      const color = snap.val();
      const el = document.getElementById("botonLike");
      if (color && el) el.style.background = color;
    });
  }

  function animarLogo() {
    const logo = document.getElementById("logoKBROS");
    const efectos = ["shake", "spin", "zoom", "bounce-logo", "pulse"];
    const efecto = efectos[Math.floor(Math.random() * efectos.length)];
    logo.classList.remove("logo-anim");
    void logo.offsetWidth;
    logo.classList.add("logo-anim");
    logo.style.animation = `${efecto} 0.6s both`;
  }

  renderMenu();
  syncFirebase();
  renderTotal();
